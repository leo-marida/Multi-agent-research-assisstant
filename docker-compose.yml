services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Override localhost URLs to use the Docker service name
      DATABASE_URL: postgresql+psycopg://postgres:password@postgres:5432/nexus
      DATABASE_URL_ASYNC: postgresql+asyncpg://postgres:password@postgres:5432/nexus
      FRONTEND_URL: http://localhost:3000

volumes:
  postgres_data:
